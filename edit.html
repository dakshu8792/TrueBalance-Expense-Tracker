{% extends "base.html" %}

{% block title %}Edit Expense — TrueBalance{% endblock %}
{% block page_title %}Edit Expense{% endblock %}

{% block topbar_actions %}
<a href="/" class="btn btn-ghost btn-sm">← Back</a>
{% endblock %}

{% block content %}

<div style="max-width:520px;">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Edit Expense</div>
        <div class="card-subtitle">Update the expense details</div>
      </div>
    </div>

    <form method="POST">

      <div class="form-group">
        <label class="form-label" for="date">Date</label>
        <input type="date" id="date" name="date" class="form-control"
               value="{{ expense['date'] }}" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="category">Category</label>
        <select id="category" name="category" class="form-control" required>
          {% for cat, icon, _ in categories %}
          <option value="{{ cat }}" {% if expense['category'] == cat %}selected{% endif %}>
            {{ icon }} {{ cat }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="amount">Amount (₹)</label>
        <div class="input-prefix">
          <span>₹</span>
          <input type="number" id="amount" name="amount" class="form-control"
                 value="{{ expense['amount'] }}" step="0.01" min="0.01" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <input type="text" id="description" name="description" class="form-control"
               value="{{ expense['description'] or '' }}" maxlength="200">
      </div>

      <div class="flex-row" style="margin-top:8px;">
        <button type="submit" class="btn btn-primary btn-lg" style="flex:1;">
          Update Expense
        </button>
        <a href="/" class="btn btn-ghost btn-lg">Cancel</a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
